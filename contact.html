<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - NPO法人咲良</title>
    <meta name="description" content="NPO法人咲良へのお問い合わせフォームです。">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="icon" type="image/png" href="assets/images/fabicon.png">
</head>
<body>
    <div id="header"></div>
    <main>
        <section class="hero">
            <div class="container">
                <h2>お問い合わせ</h2>
                <p>必要事項をご入力のうえ送信してください。</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="contact-content">
                    <div class="contact-info">
                        <div class="contact-item">
                            <h3>代表者</h3>
                            <p>南里 泰子</p>
                        </div>
                        <div class="contact-item">
                            <h3>住所</h3>
                            <p>〒811-2207 福岡県糟屋郡志免町南里３丁目１１番５号</p>
                        </div>
                    </div>

                    <form id="contact-form" class="contact-form">
                        <label class="form-label" for="contact-name">お名前</label>
                        <input class="form-input" id="contact-name" name="name" type="text" maxlength="80" required>

                        <label class="form-label" for="contact-email">メールアドレス</label>
                        <input class="form-input" id="contact-email" name="email" type="email" maxlength="254" required>

                        <label class="form-label" for="contact-message">お問い合わせ内容</label>
                        <textarea class="form-textarea" id="contact-message" name="message" rows="6" maxlength="2000" required></textarea>

                        <input id="contact-website" name="website" type="text" class="hidden-field" tabindex="-1" autocomplete="off">

                        <button class="btn btn-primary" id="contact-submit" type="submit">送信する</button>
                        <p id="contact-status" class="form-status" aria-live="polite"></p>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="assets/js/include.js"></script>
    <script type="module" src="assets/js/contact-form.js"></script>
</body>
</html>
